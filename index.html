<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Merged JSON Schema Forms</title>
<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f2f2f2;
    }

    .topbar {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: white;
        border-bottom: 1px solid #ccc;
        padding: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .tab-button {
        padding: 10px 16px;
        border: 1px solid #bbb;
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s ease;
    }

    .tab-button:hover {
        background: #f0f0f0;
    }

    .tab-button.active {
        background: #0b5177;
        color: white;
        border-color: #0b5177;
    }

    .tab-panel {
        width: 100%;
        height: calc(100vh - 70px);
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: white;
    }

/* Schema comparison tab */
.top-extra-tab{
    display:flex;
    align-items:center;
    gap:10px;
    margin-left:auto;
}

.top-extra-tab a{
    padding:10px 16px;
    border-radius:8px;
    border:1px solid #bbb;
    background:#ffffff;
    color:#111827;
    text-decoration:none;
    font-size:14px;
    transition:all 0.2s ease;
}

.top-extra-tab a:hover{
    background:#f0f0f0;
}

.top-extra-tab a.active{
    background:#0b5177;
    color:white;
    border-color:#0b5177;
}
</style>
<script>
function showTab(tabId, btn) {
    const panels = document.querySelectorAll('.tab-panel');
    panels.forEach(p => p.style.display = 'none');

    const buttons = document.querySelectorAll('.tab-button');
    buttons.forEach(b => b.classList.remove('active'));

    document.getElementById(tabId).style.display = 'block';
    btn.classList.add('active');
}
</script>
</head>
<body>
<div class="topbar">
<button class="tab-button active" onclick="showTab('tab0', this)">HSR</button><button class="tab-button" onclick="showTab('tab1', this)">TerraLID</button><button class="tab-button" onclick="showTab('tab2', this)">IGSN Archaeology</button><button class="tab-button" onclick="showTab('tab3', this)">GFZ Registration</button><button class="tab-button" onclick="showTab('tab4', this)">GFZ Descriptive</button><button class="tab-button" onclick="showTab('tab5', this)">Supplemental</button>
<div class="top-extra-tab"><a href="schema-comparison-editable-delete.html">Schema Comparison Table</a></div></div>
<div class="tab-panel" id="tab0" style="display:block;">
<iframe srcdoc="&lt;!DOCTYPE html&gt;
&lt;html lang=&quot;en&quot;&gt;

&lt;title&gt;HSR sample form&lt;/title&gt;
&lt;style&gt;
:root{--bg:#f7f6f2;--surface:#fff;--text:#241f18;--muted:#6d655a;--border:#d9d3c8;--accent:#0b5177;--good:#437a22;--warn:#964219;--accent2:#01696f;--accent3:#7a39bb}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;line-height:1.45} .wrap{max-width:1200px;margin:0 auto;padding:24px}
.hero,.output,.block{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.04)} .hero{padding:18px;margin-bottom:16px} .block{padding:16px;margin:12px 0} .output{padding:16px;margin-top:16px}

.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px} button{border:1px solid var(--border);background:#fff;padding:10px 14px;border-radius:12px;cursor:pointer} .status{color:var(--muted);font-size:13px;align-self:center} pre{white-space:pre-wrap;word-break:break-word;background:#fbfaf7;border:1px solid var(--border);padding:12px;border-radius:12px;min-height:120px}

&lt;body&gt;
&lt;div class=&quot;wrap&quot;&gt;
  &lt;div class=&quot;hero&quot;&gt;
    &lt;h1&gt;HSR sample form&lt;/h1&gt;
    &lt;p&gt;Open this page locally in a browser, fill in the form, then save or download the JSON.&lt;/p&gt;
    &lt;div class=&quot;controls&quot;&gt;&lt;button id=&quot;save&quot;&gt;Save JSON&lt;/button&gt;&lt;button id=&quot;download&quot;&gt;Download JSON&lt;/button&gt;&lt;button id=&quot;clear&quot;&gt;Clear&lt;/button&gt;&lt;span class=&quot;status&quot; id=&quot;status&quot;&gt;&lt;/span&gt;&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Sample identifier&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;id&lt;/span&gt; &lt;span class=&quot;req&quot;&gt;Required&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;id&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;The identifier property will be automatically populated with a DOI upon the creation of an IGSN ID. The system will assign a random DOI suffix unless a specific suffix is supplied using Fabrica or DataCite APIs.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;DOI&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;doi&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;fmt&quot;&gt;uri&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;doi&quot; type=&quot;url&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;section class=&quot;block&quot;&gt;&lt;h2&gt;Resource types &lt;span class=&quot;name&quot;&gt;types&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;block-desc&quot;&gt;The resourceType property may be populated with resource types from external ontologies or shared vocabularies. In the absence of an agreed vocabulary, the use of the terms “material sample” or “‘feature-of-interest” are strongly recommended to at least distinguish between these sampling concepts. A material sample is a specialization of a larger feature-of-interest, which is typically the collection site. For example, in the Geosciences, a feature-of-interest might be a lake, tree, cross-section, transect, or borehole. &lt;/p&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Resource Type&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;types.resourceType&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;enum&quot;&gt;Enum&lt;/span&gt;&lt;/div&gt;&lt;select data-path=&quot;types.resourceType&quot;&gt;&lt;option value=&quot;Heritage Sample&quot;&gt;Heritage Sample&lt;/option&gt;&lt;option value=&quot;Heritage Feature-of-Interest&quot;&gt;Heritage Feature-of-Interest&lt;/option&gt;&lt;option value=&quot;Heritage Sample Collection&quot;&gt;Heritage Sample Collection&lt;/option&gt;&lt;/select&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;resourceTypeGeneral&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;types.resourceTypeGeneral&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;types.resourceTypeGeneral&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section class=&quot;block&quot;&gt;&lt;h2&gt;Sample titles or labels &lt;span class=&quot;name&quot;&gt;titles&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;block-desc&quot;&gt;The title property should include appropriate elements that would help find and distinguish a sample. If the title is an institutional identifier, the appropriate field should be set to true.&lt;/p&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;title&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;titles[].title&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;titles[].title&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;titleType&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;titles[].titleType&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;enum&quot;&gt;Enum&lt;/span&gt;&lt;/div&gt;&lt;select data-path=&quot;titles[].titleType&quot;&gt;&lt;option value=&quot;Title&quot;&gt;Title&lt;/option&gt;&lt;option value=&quot;AlternativeTitle&quot;&gt;AlternativeTitle&lt;/option&gt;&lt;option value=&quot;Subtitle&quot;&gt;Subtitle&lt;/option&gt;&lt;option value=&quot;TranslatedTitle&quot;&gt;TranslatedTitle&lt;/option&gt;&lt;option value=&quot;Other&quot;&gt;Other&lt;/option&gt;&lt;/select&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;lang&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;titles[].lang&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;titles[].lang&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Custodian Identifier&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;titles[].isCustodianIdentifier&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;boolean&lt;/span&gt;&lt;/div&gt;&lt;label class=&quot;check&quot;&gt;&lt;input data-path=&quot;titles[].isCustodianIdentifier&quot; type=&quot;checkbox&quot;&gt; Yes&lt;/label&gt;&lt;div class=&quot;desc&quot;&gt;If the title is the identifier used by the custodian, it should be set to true.&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section class=&quot;block&quot;&gt;&lt;h2&gt;Sample Source &lt;span class=&quot;name&quot;&gt;sampleSource&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;block-desc&quot;&gt;The source of the sample&lt;/p&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Source ID&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;sampleSource.sourceId&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;sampleSource.sourceId&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;The ID of the heritage object from which the sample was taken&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Source Label&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;sampleSource.sourceLabel&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;sampleSource.sourceLabel&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;A short label for the source object, for display purposes.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Source Type&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;sampleSource.sourceType&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;enum&quot;&gt;Enum&lt;/span&gt;&lt;/div&gt;&lt;select data-path=&quot;sampleSource.sourceType&quot;&gt;&lt;option value=&quot;painting&quot;&gt;painting&lt;/option&gt;&lt;option value=&quot;sculpture&quot;&gt;sculpture&lt;/option&gt;&lt;option value=&quot;book&quot;&gt;book&lt;/option&gt;&lt;/select&gt;&lt;div class=&quot;desc&quot;&gt;The type of heritage object from which the sample was taken&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Sample Site Description&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;sampleSource.sampleSiteDescription&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;sampleSource.sampleSiteDescription&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;A description of the location of the sample on the source object&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Sample Site Annotations&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;sampleSource.sampleSiteAnnotationUrl&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;fmt&quot;&gt;uri&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;sampleSource.sampleSiteAnnotationUrl&quot; type=&quot;url&quot;&gt;&lt;div class=&quot;desc&quot;&gt;A URL to document to location of the site relative to an image of the source. It is recommended to use a link to a IIIF manifest, or a PID landing page for further documentation.&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section class=&quot;block&quot;&gt;&lt;h2&gt;Other Descriptions &lt;span class=&quot;name&quot;&gt;otherDescriptions&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;block-desc&quot;&gt;It is valuable to include additional information about a sample, particularly about its &amp;#x27;birth&amp;#x27;, in the free-text description property. If the description property is used, then the sub-property descriptionType is mandatory.&lt;/p&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Description&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;otherDescriptions[].description&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;fmt&quot;&gt;textarea&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;otherDescriptions[].description&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Description Type&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;otherDescriptions[].descriptionType&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;enum&quot;&gt;Enum&lt;/span&gt;&lt;/div&gt;&lt;select data-path=&quot;otherDescriptions[].descriptionType&quot;&gt;&lt;option value=&quot;Sample description&quot;&gt;Sample description&lt;/option&gt;&lt;option value=&quot;Sampling method&quot;&gt;Sampling method&lt;/option&gt;&lt;option value=&quot;Reason for sampling&quot;&gt;Reason for sampling&lt;/option&gt;&lt;option value=&quot;Other&quot;&gt;Other&lt;/option&gt;&lt;/select&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;lang&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;otherDescriptions[].lang&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;otherDescriptions[].lang&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Geo Locations&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;geoLocations&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;geoLocations&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;Geolocation where the sample is currently located - hidden from the user for now; if the custodian has a geolocation, it can be mirrored here&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Sizes&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;sizes&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;array&lt;/span&gt;&lt;/div&gt;&lt;textarea data-path=&quot;sizes&quot; placeholder=&quot;One item per line&quot;&gt;&lt;/textarea&gt;&lt;div class=&quot;desc&quot;&gt;The dimensions of the sample. This is a list of sizes in a unit of measure. This can be width, height, depth, diameter, weight, volume, etc. Use SI units as appropriate.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Creators&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;creators&lt;/span&gt; &lt;span class=&quot;req&quot;&gt;Required&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;array&lt;/span&gt;&lt;/div&gt;&lt;textarea data-path=&quot;creators&quot; placeholder=&quot;One item per line&quot;&gt;&lt;/textarea&gt;&lt;div class=&quot;desc&quot;&gt;The creators are the people or organisations that created, collected or processed the sample.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Custodian&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;custodian&lt;/span&gt; &lt;span class=&quot;req&quot;&gt;Required&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;custodian&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;The custodian organisation is the organisation or person that hosts the sample.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Publisher&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;publisher&lt;/span&gt; &lt;span class=&quot;req&quot;&gt;Required&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;publisher&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;The publisher is the organisation or person that publishes the record.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Publication Year&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;publicationYear&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;publicationYear&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;The publication year is the year when the record was first made available to the research community.&lt;/div&gt;&lt;/div&gt;&lt;section class=&quot;block&quot;&gt;&lt;h2&gt;Dates &lt;span class=&quot;name&quot;&gt;dates&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;block-desc&quot;&gt;Associated dates for the sample. If the date is not known precisely, use the first of January of the year to indicate the year.&lt;/p&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Collected Date&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;dates.collectedDate&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;fmt&quot;&gt;date&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;dates.collectedDate&quot; type=&quot;date&quot;&gt;&lt;div class=&quot;desc&quot;&gt;The collected date is the date when the sample was collected.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Mounted Date&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;dates.mountedDate&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;fmt&quot;&gt;date&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;dates.mountedDate&quot; type=&quot;date&quot;&gt;&lt;div class=&quot;desc&quot;&gt;The mounted date is the date when the sample was mounted.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Consumed Date&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;dates.consumedDate&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;fmt&quot;&gt;date&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;dates.consumedDate&quot; type=&quot;date&quot;&gt;&lt;div class=&quot;desc&quot;&gt;The consumed date is the date when the sample was consumed.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Destroyed Date&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;dates.destroyedDate&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;fmt&quot;&gt;date&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;dates.destroyedDate&quot; type=&quot;date&quot;&gt;&lt;div class=&quot;desc&quot;&gt;The destroyed date is the date when the sample was destroyed.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Published Date&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;dates.publishedDate&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;fmt&quot;&gt;date&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;dates.publishedDate&quot; type=&quot;date&quot;&gt;&lt;div class=&quot;desc&quot;&gt;The published date is the date when the record was published.&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section class=&quot;block&quot;&gt;&lt;h2&gt;Documentation Identifier &lt;span class=&quot;name&quot;&gt;documentationIdentifier&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;block-desc&quot;&gt;This is the principal identifier for the original documentation registry of the sample.&lt;/p&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Related Identifier&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;documentationIdentifier.relatedIdentifier&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;documentationIdentifier.relatedIdentifier&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Related Identifier Type&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;documentationIdentifier.relatedIdentifierType&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;enum&quot;&gt;Enum&lt;/span&gt;&lt;/div&gt;&lt;select data-path=&quot;documentationIdentifier.relatedIdentifierType&quot;&gt;&lt;option value=&quot;ARK&quot;&gt;ARK&lt;/option&gt;&lt;option value=&quot;arXiv&quot;&gt;arXiv&lt;/option&gt;&lt;option value=&quot;bibcode&quot;&gt;bibcode&lt;/option&gt;&lt;option value=&quot;DOI&quot;&gt;DOI&lt;/option&gt;&lt;option value=&quot;EAN13&quot;&gt;EAN13&lt;/option&gt;&lt;option value=&quot;EISSN&quot;&gt;EISSN&lt;/option&gt;&lt;option value=&quot;Handle&quot;&gt;Handle&lt;/option&gt;&lt;option value=&quot;IGSN&quot;&gt;IGSN&lt;/option&gt;&lt;option value=&quot;ISBN&quot;&gt;ISBN&lt;/option&gt;&lt;option value=&quot;ISSN&quot;&gt;ISSN&lt;/option&gt;&lt;option value=&quot;ISTC&quot;&gt;ISTC&lt;/option&gt;&lt;option value=&quot;LISSN&quot;&gt;LISSN&lt;/option&gt;&lt;option value=&quot;LSID&quot;&gt;LSID&lt;/option&gt;&lt;option value=&quot;PMID&quot;&gt;PMID&lt;/option&gt;&lt;option value=&quot;PURL&quot;&gt;PURL&lt;/option&gt;&lt;option value=&quot;UPC&quot;&gt;UPC&lt;/option&gt;&lt;option value=&quot;URL&quot;&gt;URL&lt;/option&gt;&lt;option value=&quot;URN&quot;&gt;URN&lt;/option&gt;&lt;option value=&quot;w3id&quot;&gt;w3id&lt;/option&gt;&lt;/select&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Relation Type&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;documentationIdentifier.relationType&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;enum&quot;&gt;Enum&lt;/span&gt;&lt;/div&gt;&lt;select data-path=&quot;documentationIdentifier.relationType&quot;&gt;&lt;option value=&quot;IsDocumentedBy&quot;&gt;IsDocumentedBy&lt;/option&gt;&lt;/select&gt;&lt;div class=&quot;desc&quot;&gt;The relatedIdentifier property can be used to make connections that mirror sample hierarchies. Because the parent IGSN ID is a key element in IGSN ID metadata, it is recommended that a child (sub)sample identifies its parent using the relationType &amp;#x27;IsPartOf&amp;#x27; or &amp;#x27;IsDerivedFrom&amp;#x27;. Vice versa, a parent sample can identify its children using &amp;#x27;HasPart&amp;#x27; or &amp;#x27;IsSourceOf&amp;#x27;.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Resource Type General&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;documentationIdentifier.resourceTypeGeneral&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;enum&quot;&gt;Enum&lt;/span&gt;&lt;/div&gt;&lt;select data-path=&quot;documentationIdentifier.resourceTypeGeneral&quot;&gt;&lt;option value=&quot;Other&quot;&gt;Other&lt;/option&gt;&lt;/select&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section class=&quot;block&quot;&gt;&lt;h2&gt;Alternate Identifiers &lt;span class=&quot;name&quot;&gt;alternateIdentifiers&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;block-desc&quot;&gt;The alternateIdentifier property may be used to enter any other identifiers for the material sample, including local sample identifiers.&lt;/p&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Alternate Identifier&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;alternateIdentifiers[].alternateIdentifier&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;alternateIdentifiers[].alternateIdentifier&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;alternateIdentifierType&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;alternateIdentifiers[].alternateIdentifierType&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;alternateIdentifiers[].alternateIdentifierType&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Materials Terms&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;materialTerms&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;array&lt;/span&gt;&lt;/div&gt;&lt;textarea data-path=&quot;materialTerms&quot; placeholder=&quot;One item per line&quot;&gt;&lt;/textarea&gt;&lt;div class=&quot;desc&quot;&gt;The material terms related to the sample or its source.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Sample Type&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;sampleType&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;enum&quot;&gt;Enum&lt;/span&gt;&lt;/div&gt;&lt;select data-path=&quot;sampleType&quot;&gt;&lt;option value=&quot;Borehole&quot;&gt;Borehole&lt;/option&gt;&lt;option value=&quot;Cross section&quot;&gt;Cross section&lt;/option&gt;&lt;option value=&quot;Fragment&quot;&gt;Fragment&lt;/option&gt;&lt;option value=&quot;Scraping&quot;&gt;Scraping&lt;/option&gt;&lt;option value=&quot;Thin section&quot;&gt;Thin section&lt;/option&gt;&lt;/select&gt;&lt;div class=&quot;desc&quot;&gt;The type of sample.&lt;/div&gt;&lt;/div&gt;&lt;section class=&quot;block&quot;&gt;&lt;h2&gt;Subjects, Keywords and Classification codes &lt;span class=&quot;name&quot;&gt;subjects&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;block-desc&quot;&gt;The free-text subject property contains the &amp;#x27;subject, keyword, classification code, or key phrase describing the resource.&amp;#x27; Do not use this for material terms or sample type.&lt;/p&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Subject&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;subjects[].subject&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;subjects[].subject&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Subject Scheme&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;subjects[].subjectScheme&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;subjects[].subjectScheme&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Scheme URI&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;subjects[].schemeUri&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;fmt&quot;&gt;uri&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;subjects[].schemeUri&quot; type=&quot;url&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Value URI&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;subjects[].valueUri&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;fmt&quot;&gt;uri&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;subjects[].valueUri&quot; type=&quot;url&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Classification Code&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;subjects[].classificationCode&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;subjects[].classificationCode&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;lang&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;subjects[].lang&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;subjects[].lang&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Version&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;version&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;version&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;The version of the sample description. Suggested practice: track major_version.minor_version.&lt;/div&gt;&lt;/div&gt;&lt;section class=&quot;block&quot;&gt;&lt;h2&gt;Funding References &lt;span class=&quot;name&quot;&gt;fundingReferences&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;block-desc&quot;&gt;&lt;/p&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Funder Name&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;fundingReferences[].funderName&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;fundingReferences[].funderName&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Funder Identifier&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;fundingReferences[].funderIdentifier&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;fundingReferences[].funderIdentifier&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Funder Identifier Type&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;fundingReferences[].funderIdentifierType&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;enum&quot;&gt;Enum&lt;/span&gt;&lt;/div&gt;&lt;select data-path=&quot;fundingReferences[].funderIdentifierType&quot;&gt;&lt;option value=&quot;ISNI&quot;&gt;ISNI&lt;/option&gt;&lt;option value=&quot;GRID&quot;&gt;GRID&lt;/option&gt;&lt;option value=&quot;Crossref Funder ID&quot;&gt;Crossref Funder ID&lt;/option&gt;&lt;option value=&quot;ROR&quot;&gt;ROR&lt;/option&gt;&lt;option value=&quot;Other&quot;&gt;Other&lt;/option&gt;&lt;/select&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Award Number&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;fundingReferences[].awardNumber&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;fundingReferences[].awardNumber&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Award URI&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;fundingReferences[].awardUri&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;fmt&quot;&gt;uri&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;fundingReferences[].awardUri&quot; type=&quot;url&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Award Title&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;fundingReferences[].awardTitle&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;fundingReferences[].awardTitle&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section class=&quot;block&quot;&gt;&lt;h2&gt;Rights List &lt;span class=&quot;name&quot;&gt;rightsList&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;block-desc&quot;&gt;&lt;/p&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Rights&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;rightsList[].rights&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;rightsList[].rights&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Rights URI&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;rightsList[].rightsUri&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;fmt&quot;&gt;uri&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;rightsList[].rightsUri&quot; type=&quot;url&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Rights Identifier&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;rightsList[].rightsIdentifier&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;rightsList[].rightsIdentifier&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Rights Identifier Scheme&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;rightsList[].rightsIdentifierScheme&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;rightsList[].rightsIdentifierScheme&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Scheme URI&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;rightsList[].schemeUri&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;fmt&quot;&gt;uri&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;rightsList[].schemeUri&quot; type=&quot;url&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;lang&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;rightsList[].lang&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;rightsList[].lang&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section class=&quot;block&quot;&gt;&lt;h2&gt;Related Identifiers &lt;span class=&quot;name&quot;&gt;relatedIdentifiers&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;block-desc&quot;&gt;Connecting samples to one another, and to research based on them, is a primary goal of the IGSN ID. Such connections are captured through relatedIdentifier properties, which list the globally unique Identifiers assigned to related resources. It is therefore recommended that relatedIdentifier is used to the maximum extent possible and is updated on a regular basis. Sample collections should be referenced via relationType &amp;#x27;IsPartOf&amp;#x27; pointing to the collection&amp;#x27;s DOI or IGSN.&lt;/p&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Related Identifier&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;relatedIdentifiers[].relatedIdentifier&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;relatedIdentifiers[].relatedIdentifier&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Related Identifier Type&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;relatedIdentifiers[].relatedIdentifierType&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;enum&quot;&gt;Enum&lt;/span&gt;&lt;/div&gt;&lt;select data-path=&quot;relatedIdentifiers[].relatedIdentifierType&quot;&gt;&lt;option value=&quot;ARK&quot;&gt;ARK&lt;/option&gt;&lt;option value=&quot;arXiv&quot;&gt;arXiv&lt;/option&gt;&lt;option value=&quot;bibcode&quot;&gt;bibcode&lt;/option&gt;&lt;option value=&quot;DOI&quot;&gt;DOI&lt;/option&gt;&lt;option value=&quot;EAN13&quot;&gt;EAN13&lt;/option&gt;&lt;option value=&quot;EISSN&quot;&gt;EISSN&lt;/option&gt;&lt;option value=&quot;Handle&quot;&gt;Handle&lt;/option&gt;&lt;option value=&quot;IGSN&quot;&gt;IGSN&lt;/option&gt;&lt;option value=&quot;ISBN&quot;&gt;ISBN&lt;/option&gt;&lt;option value=&quot;ISSN&quot;&gt;ISSN&lt;/option&gt;&lt;option value=&quot;ISTC&quot;&gt;ISTC&lt;/option&gt;&lt;option value=&quot;LISSN&quot;&gt;LISSN&lt;/option&gt;&lt;option value=&quot;LSID&quot;&gt;LSID&lt;/option&gt;&lt;option value=&quot;PMID&quot;&gt;PMID&lt;/option&gt;&lt;option value=&quot;PURL&quot;&gt;PURL&lt;/option&gt;&lt;option value=&quot;UPC&quot;&gt;UPC&lt;/option&gt;&lt;option value=&quot;URL&quot;&gt;URL&lt;/option&gt;&lt;option value=&quot;URN&quot;&gt;URN&lt;/option&gt;&lt;option value=&quot;w3id&quot;&gt;w3id&lt;/option&gt;&lt;/select&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Relation Type&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;relatedIdentifiers[].relationType&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;enum&quot;&gt;Enum&lt;/span&gt;&lt;/div&gt;&lt;select data-path=&quot;relatedIdentifiers[].relationType&quot;&gt;&lt;option value=&quot;IsCitedBy&quot;&gt;IsCitedBy&lt;/option&gt;&lt;option value=&quot;Cites&quot;&gt;Cites&lt;/option&gt;&lt;option value=&quot;IsCollectedBy&quot;&gt;IsCollectedBy&lt;/option&gt;&lt;option value=&quot;Collects&quot;&gt;Collects&lt;/option&gt;&lt;option value=&quot;IsSupplementTo&quot;&gt;IsSupplementTo&lt;/option&gt;&lt;option value=&quot;IsSupplementedBy&quot;&gt;IsSupplementedBy&lt;/option&gt;&lt;option value=&quot;IsContinuedBy&quot;&gt;IsContinuedBy&lt;/option&gt;&lt;option value=&quot;Continues&quot;&gt;Continues&lt;/option&gt;&lt;option value=&quot;IsDescribedBy&quot;&gt;IsDescribedBy&lt;/option&gt;&lt;option value=&quot;Describes&quot;&gt;Describes&lt;/option&gt;&lt;option value=&quot;HasMetadata&quot;&gt;HasMetadata&lt;/option&gt;&lt;option value=&quot;IsMetadataFor&quot;&gt;IsMetadataFor&lt;/option&gt;&lt;option value=&quot;HasVersion&quot;&gt;HasVersion&lt;/option&gt;&lt;option value=&quot;IsVersionOf&quot;&gt;IsVersionOf&lt;/option&gt;&lt;option value=&quot;IsNewVersionOf&quot;&gt;IsNewVersionOf&lt;/option&gt;&lt;option value=&quot;IsPartOf&quot;&gt;IsPartOf&lt;/option&gt;&lt;option value=&quot;IsPreviousVersionOf&quot;&gt;IsPreviousVersionOf&lt;/option&gt;&lt;option value=&quot;IsPublishedIn&quot;&gt;IsPublishedIn&lt;/option&gt;&lt;option value=&quot;HasPart&quot;&gt;HasPart&lt;/option&gt;&lt;option value=&quot;IsReferencedBy&quot;&gt;IsReferencedBy&lt;/option&gt;&lt;option value=&quot;References&quot;&gt;References&lt;/option&gt;&lt;option value=&quot;IsDocumentedBy&quot;&gt;IsDocumentedBy&lt;/option&gt;&lt;option value=&quot;Documents&quot;&gt;Documents&lt;/option&gt;&lt;option value=&quot;IsCompiledBy&quot;&gt;IsCompiledBy&lt;/option&gt;&lt;option value=&quot;Compiles&quot;&gt;Compiles&lt;/option&gt;&lt;option value=&quot;IsVariantFormOf&quot;&gt;IsVariantFormOf&lt;/option&gt;&lt;option value=&quot;IsOriginalFormOf&quot;&gt;IsOriginalFormOf&lt;/option&gt;&lt;option value=&quot;IsIdenticalTo&quot;&gt;IsIdenticalTo&lt;/option&gt;&lt;option value=&quot;IsReviewedBy&quot;&gt;IsReviewedBy&lt;/option&gt;&lt;option value=&quot;Reviews&quot;&gt;Reviews&lt;/option&gt;&lt;option value=&quot;IsDerivedFrom&quot;&gt;IsDerivedFrom&lt;/option&gt;&lt;option value=&quot;IsSourceOf&quot;&gt;IsSourceOf&lt;/option&gt;&lt;option value=&quot;IsRequiredBy&quot;&gt;IsRequiredBy&lt;/option&gt;&lt;option value=&quot;Requires&quot;&gt;Requires&lt;/option&gt;&lt;option value=&quot;IsObsoletedBy&quot;&gt;IsObsoletedBy&lt;/option&gt;&lt;option value=&quot;Obsoletes&quot;&gt;Obsoletes&lt;/option&gt;&lt;/select&gt;&lt;div class=&quot;desc&quot;&gt;The relatedIdentifier property can be used to make connections that mirror sample hierarchies. Because the parent IGSN ID is a key element in IGSN ID metadata, it is recommended that a child (sub)sample identifies its parent using the relationType &amp;#x27;IsPartOf&amp;#x27; or &amp;#x27;IsDerivedFrom&amp;#x27;. Vice versa, a parent sample can identify its children using &amp;#x27;HasPart&amp;#x27; or &amp;#x27;IsSourceOf&amp;#x27;.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Related Metadata Scheme&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;relatedIdentifiers[].relatedMetadataScheme&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;relatedIdentifiers[].relatedMetadataScheme&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;NOTE: Use only with this relation pair: HasMetadata / IsMetadataFor&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Scheme URI&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;relatedIdentifiers[].schemeUri&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;fmt&quot;&gt;uri&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;relatedIdentifiers[].schemeUri&quot; type=&quot;url&quot;&gt;&lt;div class=&quot;desc&quot;&gt;NOTE: Use only with this relation pair: HasMetadata / IsMetadataFor&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Scheme Type&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;relatedIdentifiers[].schemeType&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;relatedIdentifiers[].schemeType&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;NOTE: Use only with this relation pair: HasMetadata / IsMetadataFor&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Resource Type General&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;relatedIdentifiers[].resourceTypeGeneral&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;enum&quot;&gt;Enum&lt;/span&gt;&lt;/div&gt;&lt;select data-path=&quot;relatedIdentifiers[].resourceTypeGeneral&quot;&gt;&lt;option value=&quot;Audiovisual&quot;&gt;Audiovisual&lt;/option&gt;&lt;option value=&quot;Book&quot;&gt;Book&lt;/option&gt;&lt;option value=&quot;BookChapter&quot;&gt;BookChapter&lt;/option&gt;&lt;option value=&quot;Collection&quot;&gt;Collection&lt;/option&gt;&lt;option value=&quot;ComputationalNotebook&quot;&gt;ComputationalNotebook&lt;/option&gt;&lt;option value=&quot;ConferencePaper&quot;&gt;ConferencePaper&lt;/option&gt;&lt;option value=&quot;ConferenceProceeding&quot;&gt;ConferenceProceeding&lt;/option&gt;&lt;option value=&quot;DataPaper&quot;&gt;DataPaper&lt;/option&gt;&lt;option value=&quot;Dataset&quot;&gt;Dataset&lt;/option&gt;&lt;option value=&quot;Dissertation&quot;&gt;Dissertation&lt;/option&gt;&lt;option value=&quot;Event&quot;&gt;Event&lt;/option&gt;&lt;option value=&quot;Image&quot;&gt;Image&lt;/option&gt;&lt;option value=&quot;Instrument&quot;&gt;Instrument&lt;/option&gt;&lt;option value=&quot;InteractiveResource&quot;&gt;InteractiveResource&lt;/option&gt;&lt;option value=&quot;Journal&quot;&gt;Journal&lt;/option&gt;&lt;option value=&quot;JournalArticle&quot;&gt;JournalArticle&lt;/option&gt;&lt;option value=&quot;Model&quot;&gt;Model&lt;/option&gt;&lt;option value=&quot;OutputManagementPlan&quot;&gt;OutputManagementPlan&lt;/option&gt;&lt;option value=&quot;PeerReview&quot;&gt;PeerReview&lt;/option&gt;&lt;option value=&quot;PhysicalObject&quot;&gt;PhysicalObject&lt;/option&gt;&lt;option value=&quot;Preprint&quot;&gt;Preprint&lt;/option&gt;&lt;option value=&quot;Report&quot;&gt;Report&lt;/option&gt;&lt;option value=&quot;Service&quot;&gt;Service&lt;/option&gt;&lt;option value=&quot;Software&quot;&gt;Software&lt;/option&gt;&lt;option value=&quot;Sound&quot;&gt;Sound&lt;/option&gt;&lt;option value=&quot;Standard&quot;&gt;Standard&lt;/option&gt;&lt;option value=&quot;StudyRegistration&quot;&gt;StudyRegistration&lt;/option&gt;&lt;option value=&quot;Text&quot;&gt;Text&lt;/option&gt;&lt;option value=&quot;Workflow&quot;&gt;Workflow&lt;/option&gt;&lt;option value=&quot;Other&quot;&gt;Other&lt;/option&gt;&lt;/select&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Display Title&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;_displayTitle&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;_displayTitle&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;Automatically generated title based on the titles array.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Custodian Names&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;_custodianNames&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;array&lt;/span&gt;&lt;/div&gt;&lt;textarea data-path=&quot;_custodianNames&quot; placeholder=&quot;One item per line&quot;&gt;&lt;/textarea&gt;&lt;div class=&quot;desc&quot;&gt;Automatically generated list of custodian names based on the titles array.&lt;/div&gt;&lt;/div&gt;
  &lt;div class=&quot;output&quot;&gt;&lt;h2&gt;JSON preview&lt;/h2&gt;&lt;pre id=&quot;preview&quot;&gt;&lt;/pre&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;script&gt;
const STORAGE_KEY = 'form-hsr-sample';

function setDeep(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i &lt; parts.length - 1; i++) {
    if (!cur[parts[i]] || typeof cur[parts[i]] !== 'object' || Array.isArray(cur[parts[i]])) cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = value;
}

function getDeep(obj, path) {
  return path.split('.').reduce((acc, key) =&gt; (acc &amp;&amp; acc[key] !== undefined ? acc[key] : undefined), obj);
}

function normalizeValue(el) {
  if (el.type === 'checkbox') return el.checked;
  if (el.tagName === 'TEXTAREA') {
    const txt = el.value.trim();
    if (txt.includes('\n')) return txt.split('\n').map(v =&gt; v.trim()).filter(Boolean);
    return txt;
  }
  if (el.type === 'number') return el.value === '' ? null : Number(el.value);
  return el.value;
}

function collect() {
  const out = {};
  document.querySelectorAll('[data-path]').forEach(el =&gt; setDeep(out, el.dataset.path, normalizeValue(el)));
  return out;
}

function updatePreview() {
  document.getElementById('preview').textContent = JSON.stringify(collect(), null, 2);
}

function fillForm(data) {
  document.querySelectorAll('[data-path]').forEach(el =&gt; {
    const v = getDeep(data, el.dataset.path);
    if (v === undefined || v === null) return;
    if (el.type === 'checkbox') el.checked = Boolean(v);
    else if (el.tagName === 'TEXTAREA' &amp;&amp; Array.isArray(v)) el.value = v.join('\n');
    else el.value = Array.isArray(v) ? v.join('\n') : String(v);
  });
}

function saveLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(collect(), null, 2));
  document.getElementById('status').textContent = 'Saved locally';
  setTimeout(() =&gt; document.getElementById('status').textContent = '', 1500);
}

function downloadJson() {
  const jsonText = JSON.stringify(collect(), null, 2);
  const blob = new Blob([jsonText], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'hsr-sample.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function clearForm() {
  localStorage.removeItem(STORAGE_KEY);
  document.querySelectorAll('[data-path]').forEach(el =&gt; {
    if (el.type === 'checkbox') el.checked = false;
    else if (el.tagName === 'SELECT') el.selectedIndex = 0;
    else el.value = '';
  });
  updatePreview();
  document.getElementById('status').textContent = 'Cleared';
  setTimeout(() =&gt; document.getElementById('status').textContent = '', 1500);
}

document.addEventListener('input', updatePreview);
document.getElementById('save').addEventListener('click', saveLocal);
document.getElementById('download').addEventListener('click', downloadJson);
document.getElementById('clear').addEventListener('click', clearForm);

const saved = localStorage.getItem(STORAGE_KEY);
if (saved) {
  try { fillForm(JSON.parse(saved)); } catch (e) {}
}

updatePreview();
&lt;/script&gt;
&lt;/body&gt;

;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;sample_status.status_accessibility&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;Is the material accessible to other researchers and do restrictions apply?&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;section class=&quot;block&quot;&gt;&lt;h2&gt;Relations &lt;span class=&quot;name&quot;&gt;sample_relation&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;block-desc&quot;&gt;Information about related entities, including analysis made on the sample, and other research output such as publications providing relevant information about the sample. This includes any literature from which information about the sample was extracted.&lt;/p&gt;&lt;section class=&quot;block&quot;&gt;&lt;h2&gt;Persistent Identifier &lt;span class=&quot;name&quot;&gt;sample_relation[].relation_pid&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;block-desc&quot;&gt;The persistent identifier or TerraLID ID associated with a resource or related research output. If referring to another entity in the TerraLID database, the TerraLID identifier must be used.&lt;/p&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;VALUE&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;sample_relation[].relation_pid[].relation_pid_value&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;sample_relation[].relation_pid[].relation_pid_value&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;Value of the persistent identifier or TerraLID ID.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;TYPE&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;sample_relation[].relation_pid[].relation_pid_type&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;sample_relation[].relation_pid[].relation_pid_type&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;The type of the identifier.&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Full reference&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;sample_relation[].relation_text&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;sample_relation[].relation_text&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;The full reference of a publication.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Kind of relation&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;sample_relation[].relation_kind&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;array&lt;/span&gt;&lt;/div&gt;&lt;textarea data-path=&quot;sample_relation[].relation_kind&quot; placeholder=&quot;One item per line&quot;&gt;&lt;/textarea&gt;&lt;div class=&quot;desc&quot;&gt;Relationship between item and the research output.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Type of resource&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;sample_relation[].relation_resource&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;array&lt;/span&gt;&lt;/div&gt;&lt;textarea data-path=&quot;sample_relation[].relation_resource&quot; placeholder=&quot;One item per line&quot;&gt;&lt;/textarea&gt;&lt;div class=&quot;desc&quot;&gt;Type of resource or research output.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Additional details&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;sample_relation[].relation_detail&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;array&lt;/span&gt;&lt;/div&gt;&lt;textarea data-path=&quot;sample_relation[].relation_detail&quot; placeholder=&quot;One item per line&quot;&gt;&lt;/textarea&gt;&lt;div class=&quot;desc&quot;&gt;Additional information about the relation, e.g., if the related work addresses a specific aspect of the item (e.g., the geological setting).&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;
  &lt;div class=&quot;output&quot;&gt;&lt;h2&gt;JSON preview&lt;/h2&gt;&lt;pre id=&quot;preview&quot;&gt;&lt;/pre&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;script&gt;
const STORAGE_KEY = 'form-terralid-sample';

function setDeep(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i &lt; parts.length - 1; i++) {
    if (!cur[parts[i]] || typeof cur[parts[i]] !== 'object' || Array.isArray(cur[parts[i]])) cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = value;
}

function getDeep(obj, path) {
  return path.split('.').reduce((acc, key) =&gt; (acc &amp;&amp; acc[key] !== undefined ? acc[key] : undefined), obj);
}

function normalizeValue(el) {
  if (el.type === 'checkbox') return el.checked;
  if (el.tagName === 'TEXTAREA') {
    const txt = el.value.trim();
    if (txt.includes('\n')) return txt.split('\n').map(v =&gt; v.trim()).filter(Boolean);
    return txt;
  }
  if (el.type === 'number') return el.value === '' ? null : Number(el.value);
  return el.value;
}

function collect() {
  const out = {};
  document.querySelectorAll('[data-path]').forEach(el =&gt; setDeep(out, el.dataset.path, normalizeValue(el)));
  return out;
}

function fillForm(data) {
  document.querySelectorAll('[data-path]').forEach(el =&gt; {
    const v = getDeep(data, el.dataset.path);
    if (v === undefined || v === null) return;
    if (el.type === 'checkbox') el.checked = Boolean(v);
    else if (el.tagName === 'TEXTAREA' &amp;&amp; Array.isArray(v)) el.value = v.join('\n');
    else el.value = Array.isArray(v) ? v.join('\n') : String(v);
  });
}

function updatePreview() {
  const preview = document.getElementById('preview');
  if (preview) preview.textContent = JSON.stringify(collect(), null, 2);
}

function saveLocal() {
  const jsonText = JSON.stringify(collect(), null, 2);
  localStorage.setItem(STORAGE_KEY, jsonText);
  const status = document.getElementById('status');
  if (status) {
    status.textContent = 'Saved locally';
    setTimeout(() =&gt; status.textContent = '', 1500);
  }
}

function downloadJson() {
  const jsonText = JSON.stringify(collect(), null, 2);
  const blob = new Blob([jsonText], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'terralid-sample.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function clearForm() {
  localStorage.removeItem(STORAGE_KEY);
  document.querySelectorAll('[data-path]').forEach(el =&gt; {
    if (el.type === 'checkbox') el.checked = false;
    else if (el.tagName === 'SELECT') el.selectedIndex = 0;
    else el.value = '';
  });
  updatePreview();
}

document.addEventListener('input', updatePreview);
document.getElementById('save')?.addEventListener('click', saveLocal);
document.getElementById('download')?.addEventListener('click', downloadJson);
document.getElementById('clear')?.addEventListener('click', clearForm);

const saved = localStorage.getItem(STORAGE_KEY);
if (saved) {
  try { fillForm(JSON.parse(saved)); } catch (e) {}
}

updatePreview();
&lt;/script&gt;
&lt;/body&gt;

&lt;script&gt;
const STORAGE_KEY = 'form-gfz_descriptive';

function setDeep(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i &lt; parts.length - 1; i++) {
    if (!cur[parts[i]] || typeof cur[parts[i]] !== 'object' || Array.isArray(cur[parts[i]])) cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = value;
}

function getDeep(obj, path) {
  return path.split('.').reduce((acc, key) =&gt; (acc &amp;&amp; acc[key] !== undefined ? acc[key] : undefined), obj);
}

function normalizeValue(el) {
  if (el.type === 'checkbox') return el.checked;
  if (el.tagName === 'TEXTAREA') {
    const txt = el.value.trim();
    if (txt.includes('\n')) return txt.split('\n').map(v =&gt; v.trim()).filter(Boolean);
    return txt;
  }
  if (el.type === 'number') return el.value === '' ? null : Number(el.value);
  return el.value;
}

function collect() {
  const out = {};
  document.querySelectorAll('[data-path]').forEach(el =&gt; setDeep(out, el.dataset.path, normalizeValue(el)));
  return out;
}

function fillForm(data) {
  document.querySelectorAll('[data-path]').forEach(el =&gt; {
    const v = getDeep(data, el.dataset.path);
    if (v === undefined || v === null) return;
    if (el.type === 'checkbox') el.checked = Boolean(v);
    else if (el.tagName === 'TEXTAREA' &amp;&amp; Array.isArray(v)) el.value = v.join('\n');
    else el.value = Array.isArray(v) ? v.join('\n') : String(v);
  });
}

function updatePreview() {
  const preview = document.getElementById('preview');
  if (preview) preview.textContent = JSON.stringify(collect(), null, 2);
}

function saveLocal() {
  const jsonText = JSON.stringify(collect(), null, 2);
  localStorage.setItem(STORAGE_KEY, jsonText);
  const status = document.getElementById('status');
  if (status) {
    status.textContent = 'Saved locally';
    setTimeout(() =&gt; status.textContent = '', 1500);
  }
}

function downloadJson() {
  const jsonText = JSON.stringify(collect(), null, 2);
  const blob = new Blob([jsonText], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gfz_descriptive.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function clearForm() {
  localStorage.removeItem(STORAGE_KEY);
  document.querySelectorAll('[data-path]').forEach(el =&gt; {
    if (el.type === 'checkbox') el.checked = false;
    else if (el.tagName === 'SELECT') el.selectedIndex = 0;
    else el.value = '';
  });
  updatePreview();
}

document.addEventListener('input', updatePreview);
document.getElementById('save')?.addEventListener('click', saveLocal);
document.getElementById('download')?.addEventListener('click', downloadJson);
document.getElementById('clear')?.addEventListener('click', clearForm);

const saved = localStorage.getItem(STORAGE_KEY);
if (saved) {
  try { fillForm(JSON.parse(saved)); } catch (e) {}
}

updatePreview();
&lt;/script&gt;
&lt;/body&gt;

uot;Corer:Piston,Giant&quot;&gt;Corer:Piston,Giant&lt;/option&gt;&lt;option value=&quot;Corer:Rock&quot;&gt;Corer:Rock&lt;/option&gt;&lt;option value=&quot;Corer:SideSaddle&quot;&gt;Corer:SideSaddle&lt;/option&gt;&lt;option value=&quot;Corer:TriggerWeight&quot;&gt;Corer:TriggerWeight&lt;/option&gt;&lt;option value=&quot;Corer:Vibrating&quot;&gt;Corer:Vibrating&lt;/option&gt;&lt;option value=&quot;Dredge&quot;&gt;Dredge&lt;/option&gt;&lt;option value=&quot;Dredge:ChainBag&quot;&gt;Dredge:ChainBag&lt;/option&gt;&lt;option value=&quot;Dredge:Scallop&quot;&gt;Dredge:Scallop&lt;/option&gt;&lt;option value=&quot;Grab&quot;&gt;Grab&lt;/option&gt;&lt;option value=&quot;Hand&quot;&gt;Hand&lt;/option&gt;&lt;option value=&quot;Hand:Auger&quot;&gt;Hand:Auger&lt;/option&gt;&lt;option value=&quot;Hand:Hammer&quot;&gt;Hand:Hammer&lt;/option&gt;&lt;option value=&quot;Hand:Knife&quot;&gt;Hand:Knife&lt;/option&gt;&lt;option value=&quot;Net&quot;&gt;Net&lt;/option&gt;&lt;option value=&quot;Net:MOCNESS&quot;&gt;Net:MOCNESS&lt;/option&gt;&lt;option value=&quot;Probe&quot;&gt;Probe&lt;/option&gt;&lt;option value=&quot;Scoop&quot;&gt;Scoop&lt;/option&gt;&lt;option value=&quot;Trap&quot;&gt;Trap&lt;/option&gt;&lt;option value=&quot;Trawl&quot;&gt;Trawl&lt;/option&gt;&lt;option value=&quot;Other&quot;&gt;Other&lt;/option&gt;&lt;option value=&quot;Unknown&quot;&gt;Unknown&lt;/option&gt;&lt;/select&gt;&lt;div class=&quot;desc&quot;&gt;Primary collection method.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;alternateCollectionMethods&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;collectionMethods.alternateCollectionMethods&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;array&lt;/span&gt;&lt;/div&gt;&lt;textarea data-path=&quot;collectionMethods.alternateCollectionMethods&quot; placeholder=&quot;One item per line&quot;&gt;&lt;/textarea&gt;&lt;div class=&quot;desc&quot;&gt;Additional collection method terms.&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;collectionTime&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;collectionTime&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;fmt&quot;&gt;date-time&lt;/span&gt;&lt;/div&gt;&lt;input data-path=&quot;collectionTime&quot; type=&quot;text&quot;&gt;&lt;div class=&quot;desc&quot;&gt;Date and time when the resource was collected.&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;sampleAccess&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;sampleAccess&lt;/span&gt; &lt;span class=&quot;req&quot;&gt;Required&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;string&lt;/span&gt; &lt;span class=&quot;enum&quot;&gt;Enum&lt;/span&gt;&lt;/div&gt;&lt;select data-path=&quot;sampleAccess&quot;&gt;&lt;option value=&quot;Public&quot;&gt;Public&lt;/option&gt;&lt;option value=&quot;Private&quot;&gt;Private&lt;/option&gt;&lt;/select&gt;&lt;div class=&quot;desc&quot;&gt;Whether the resource is publicly available or private.&lt;/div&gt;&lt;/div&gt;&lt;section class=&quot;block&quot;&gt;&lt;h2&gt;supplementalMetadata &lt;span class=&quot;name&quot;&gt;supplementalMetadata&lt;/span&gt;&lt;/h2&gt;&lt;p class=&quot;block-desc&quot;&gt;Additional metadata records linked to the resource.&lt;/p&gt;&lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;record&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;supplementalMetadata.record&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;array&lt;/span&gt;&lt;/div&gt;&lt;textarea data-path=&quot;supplementalMetadata.record&quot; placeholder=&quot;One item per line&quot;&gt;&lt;/textarea&gt;&lt;div class=&quot;desc&quot;&gt;Supplemental metadata records.&lt;/div&gt;&lt;/div&gt;&lt;/section&gt;

&lt;script&gt;
const STORAGE_KEY = 'form-gfz_descriptive';

function setDeep(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i &lt; parts.length - 1; i++) {
    if (!cur[parts[i]] || typeof cur[parts[i]] !== 'object' || Array.isArray(cur[parts[i]])) cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = value;
}

function getDeep(obj, path) {
  return path.split('.').reduce((acc, key) =&gt; (acc &amp;&amp; acc[key] !== undefined ? acc[key] : undefined), obj);
}

function normalizeValue(el) {
  if (el.type === 'checkbox') return el.checked;
  if (el.tagName === 'TEXTAREA') {
    const txt = el.value.trim();
    if (txt.includes('\n')) return txt.split('\n').map(v =&gt; v.trim()).filter(Boolean);
    return txt;
  }
  if (el.type === 'number') return el.value === '' ? null : Number(el.value);
  return el.value;
}

function collect() {
  const out = {};
  document.querySelectorAll('[data-path]').forEach(el =&gt; setDeep(out, el.dataset.path, normalizeValue(el)));
  return out;
}

function fillForm(data) {
  document.querySelectorAll('[data-path]').forEach(el =&gt; {
    const v = getDeep(data, el.dataset.path);
    if (v === undefined || v === null) return;
    if (el.type === 'checkbox') el.checked = Boolean(v);
    else if (el.tagName === 'TEXTAREA' &amp;&amp; Array.isArray(v)) el.value = v.join('\n');
    else el.value = Array.isArray(v) ? v.join('\n') : String(v);
  });
}

function updatePreview() {
  const preview = document.getElementById('preview');
  if (preview) preview.textContent = JSON.stringify(collect(), null, 2);
}

function saveLocal() {
  const jsonText = JSON.stringify(collect(), null, 2);
  localStorage.setItem(STORAGE_KEY, jsonText);
  const status = document.getElementById('status');
  if (status) {
    status.textContent = 'Saved locally';
    setTimeout(() =&gt; status.textContent = '', 1500);
  }
}

function downloadJson() {
  const jsonText = JSON.stringify(collect(), null, 2);
  const blob = new Blob([jsonText], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gfz_descriptive.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function clearForm() {
  localStorage.removeItem(STORAGE_KEY);
  document.querySelectorAll('[data-path]').forEach(el =&gt; {
    if (el.type === 'checkbox') el.checked = false;
    else if (el.tagName === 'SELECT') el.selectedIndex = 0;
    else el.value = '';
  });
  updatePreview();
}

document.addEventListener('input', updatePreview);
document.getElementById('save')?.addEventListener('click', saveLocal);
document.getElementById('download')?.addEventListener('click', downloadJson);
document.getElementById('clear')?.addEventListener('click', clearForm);

const saved = localStorage.getItem(STORAGE_KEY);
if (saved) {
  try { fillForm(JSON.parse(saved)); } catch (e) {}
}

updatePreview();
&lt;/script&gt;
&lt;/body&gt;

eviews&lt;/option&gt;&lt;option value=&quot;IsReviewedBy&quot;&gt;IsReviewedBy&lt;/option&gt;&lt;option value=&quot;IsDerivedFrom&quot;&gt;IsDerivedFrom&lt;/option&gt;&lt;option value=&quot;IsSourceOf&quot;&gt;IsSourceOf&lt;/option&gt;&lt;/select&gt;&lt;div class=&quot;desc&quot;&gt;&lt;/div&gt;&lt;/div&gt;

  &lt;div class=&quot;field&quot;&gt;&lt;div class=&quot;field-head&quot;&gt;&lt;strong&gt;Custodian Names&lt;/strong&gt; &lt;span class=&quot;name&quot;&gt;_custodianNames&lt;/span&gt; &lt;span class=&quot;type&quot;&gt;array&lt;/span&gt;&lt;/div&gt;&lt;textarea data-path=&quot;_custodianNames&quot; placeholder=&quot;One item per line&quot;&gt;&lt;/textarea&gt;&lt;div class=&quot;desc&quot;&gt;Automatically generated list of custodian names based on the titles array.&lt;/div&gt;&lt;/div&gt;

  &lt;div class=&quot;output&quot;&gt;&lt;h2&gt;JSON preview&lt;/h2&gt;&lt;pre id=&quot;preview&quot;&gt;&lt;/pre&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;script&gt;
const STORAGE_KEY = 'supplemental-form';
function setDeep(obj, path, value){const parts=path.split('.');let cur=obj;for(let i=0;i&lt;parts.length-1;i++){if(!cur[parts[i]]||typeof cur[parts[i]]!=='object'||Array.isArray(cur[parts[i]])) cur[parts[i]]={};cur=cur[parts[i]];}cur[parts[parts.length-1]]=value;}
function getDeep(obj, path){return path.split('.').reduce((acc,key)=&gt;(acc&amp;&amp;acc[key]!==undefined?acc[key]:undefined),obj);}
function normalizeValue(el){if(el.type==='checkbox') return el.checked;if(el.tagName==='TEXTAREA'){const txt=el.value.trim();if(txt.includes('\n')) return txt.split('\n').map(v=&gt;v.trim()).filter(Boolean);return txt;}if(el.type==='number') return el.value===''?null:Number(el.value);return el.value;}
function collect(){const out={};document.querySelectorAll('[data-path]').forEach(el=&gt;setDeep(out, el.dataset.path, normalizeValue(el)));return out;}
function updatePreview(){document.getElementById('preview').textContent=JSON.stringify(collect(), null, 2);}
function fillForm(data){document.querySelectorAll('[data-path]').forEach(el=&gt;{const v=getDeep(data, el.dataset.path);if(v===undefined||v===null) return;if(el.type==='checkbox') el.checked=Boolean(v);else if(el.tagName==='TEXTAREA' &amp;&amp; Array.isArray(v)) el.value=v.join('\n');else el.value=Array.isArray(v)?v.join('\n'):String(v);});}
function saveLocal(){localStorage.setItem(STORAGE_KEY, JSON.stringify(collect(), null, 2));document.getElementById('status').textContent='Saved locally';setTimeout(()=&gt;document.getElementById('status').textContent='',1500);}
function downloadJson(){const jsonText=JSON.stringify(collect(), null, 2);const blob=new Blob([jsonText], {type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='supplemental.json';document.body.appendChild(a);a.click();a.remove();setTimeout(()=&gt;URL.revokeObjectURL(url),1000);}
function clearForm(){localStorage.removeItem(STORAGE_KEY);document.querySelectorAll('[data-path]').forEach(el=&gt;{if(el.type==='checkbox') el.checked=false;else if(el.tagName==='SELECT') el.selectedIndex=0;else el.value='';});updatePreview();document.getElementById('status').textContent='Cleared';setTimeout(()=&gt;document.getElementById('status').textContent='',1500);}
document.addEventListener('input', updatePreview);document.getElementById('save').addEventListener('click', saveLocal);document.getElementById('download').addEventListener('click', downloadJson);document.getElementById('clear').addEventListener('click', clearForm);const saved=localStorage.getItem(STORAGE_KEY);if(saved){try{fillForm(JSON.parse(saved));}catch(e){}}updatePreview();
&lt;/script&gt;
